name: Seed Data
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  # JOB 1: Master GDELT Crawl (runs FIRST — all other jobs wait on this)
  # Does one sequential pass of gdeltproject.org and stores everything in
  # Redis under gdelt:raw:v1. All consumer seeds read from that key instead
  # of calling GDELT themselves, dropping ~91 direct API calls to ~26.
  seed-gdelt-raw:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts
            shared
            package.json
            package-lock.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts

      # Single master GDELT crawl — topics + persons + GKG
      - run: node scripts/seed-gdelt-raw.mjs

    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

  # JOB 2: Fast Lane — all non-GDELT seeds + GDELT consumers (read from cache)
  seed-fast:
    needs: [seed-gdelt-raw]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts
            shared
            package.json
            package-lock.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts

      # Free data sources (no GDELT dependency)
      - run: node scripts/seed-earthquakes.mjs
      - run: node scripts/seed-natural-events.mjs
      - run: node scripts/seed-weather-alerts.mjs
      - run: node scripts/seed-commodity-quotes.mjs
      - run: node scripts/seed-unrest-events.mjs
      - run: node scripts/seed-prediction-markets.mjs
      - run: node scripts/seed-service-statuses.mjs
      - run: node scripts/seed-climate-anomalies.mjs
      - run: node scripts/seed-gulf-quotes.mjs
      - run: node scripts/seed-etf-flows.mjs
      - run: node scripts/seed-correlation.mjs

      # API key dependent (skips gracefully if key missing)
      - run: node scripts/seed-market-quotes.mjs
        continue-on-error: true
      - run: node scripts/seed-cyber-threats.mjs
        continue-on-error: true
      - run: node scripts/seed-crypto-quotes.mjs
        continue-on-error: true
      - run: node scripts/seed-fire-detections.mjs
        continue-on-error: true
      - run: node scripts/seed-ucdp-events.mjs
        continue-on-error: true
      - run: node scripts/seed-internet-outages.mjs
        continue-on-error: true
      - run: node scripts/seed-military-flights.mjs
        continue-on-error: true

      # Webcams
      - run: node scripts/seed-webcams.mjs
        continue-on-error: true
      - run: node scripts/seed-webcams-fallback.mjs
        continue-on-error: true
      - run: node scripts/fetch-gpsjam.mjs
        continue-on-error: true

      # GDELT consumers — read from gdelt:raw:v1, zero direct GDELT calls
      - run: node scripts/seed-gdelt-intel.mjs
        continue-on-error: true
      - run: node scripts/seed-missile-events.mjs
        continue-on-error: true
      - run: node scripts/seed-warcam.mjs
        continue-on-error: true
      - run: node scripts/seed-telegram-narratives.mjs
        continue-on-error: true
      - run: node scripts/seed-narrative-drift.mjs
        continue-on-error: true

      # AI-powered (Groq) — read GDELT data from cache, not from GDELT directly
      - run: node scripts/seed-insights-from-cache.mjs
        continue-on-error: true
      - run: node scripts/seed-persons-of-interest.mjs
        continue-on-error: true
      - run: node scripts/seed-poi-discovery.mjs
        continue-on-error: true

      # Conflict forecast, disease, radiation — non-GDELT
      - run: node scripts/seed-conflict-forecast.mjs
        continue-on-error: true
      - run: node scripts/seed-disease-outbreaks.mjs
        continue-on-error: true
      - run: node scripts/seed-radiation.mjs
        continue-on-error: true

      # Derivative seeds — read everything written above
      - run: node scripts/seed-alerts.mjs
        continue-on-error: true
      - run: node scripts/agent-sitrep.mjs
        continue-on-error: true
      - run: node scripts/seed-hypothesis-generator.mjs
        continue-on-error: true

      # Indexing and archival — runs last
      - run: node scripts/seed-vector-index.mjs
        continue-on-error: true
      - run: node scripts/seed-snapshot.mjs
        continue-on-error: true
      - run: node scripts/seed-entity-graph.mjs
        continue-on-error: true

    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ACLED_EMAIL: ${{ secrets.ACLED_EMAIL }}
      ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NASA_FIRMS_API_KEY: ${{ secrets.NASA_FIRMS_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
      ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
      UCDP_ACCESS_TOKEN: ${{ secrets.UCDP_ACCESS_TOKEN }}
      UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
      UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
      NEO4J_URI: ${{ secrets.NEO4J_URI }}
      NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      WINDY_API_KEY: ${{ secrets.WINDY_API_KEY }}
      SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
      NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}

  # JOB 3: Telegram Notification (waits for fast lane)
  notify:
    needs: [seed-fast]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram
        run: |
          if [ "${{ needs.seed-fast.result }}" = "success" ]; then
            MSG="✅ <b>Seed Complete</b>%0A%0AAll fast data sources refreshed successfully.%0ATime: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0AUse /report for the latest intelligence brief."
          else
            MSG="⚠️ <b>Seed Finished (with warnings)</b>%0A%0ASome data sources may have failed.%0ATime: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0AUse /status to check data availability."
          fi
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=HTML" > /dev/null
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
