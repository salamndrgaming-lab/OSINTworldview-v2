<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor — Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #d4a843;
        --accent-dim: #a07820;
        --bg: #060608;
        --panel: #0e0e14;
        --border: #2a2a3a;
        --fg: #e8e8f0;
        --fg-dim: #8888a0;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "Geist", sans-serif;
      }
      main {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 48px 24px;
      }
      .card {
        max-width: 520px;
        width: 100%;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 48px 40px;
      }
      .mark {
        font-size: 48px;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 20px;
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
      .eyebrow {
        font-family: "JetBrains Mono", Consolas, monospace;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 22px;
        font-weight: 500;
        margin: 0 0 10px;
      }
      p {
        color: var(--fg-dim);
        margin: 0 0 28px;
        font-size: 13px;
      }
      button {
        font: inherit;
        color: var(--bg);
        background: var(--accent);
        border: none;
        border-radius: 6px;
        padding: 10px 22px;
        cursor: pointer;
        font-weight: 500;
        letter-spacing: 0.02em;
        transition: background 120ms ease-out, transform 120ms ease-out;
      }
      button:hover { background: #e6b855; }
      button:active { transform: translateY(1px); }
      .links {
        margin-top: 24px;
        font-size: 12px;
        color: var(--fg-dim);
      }
      .links a {
        color: var(--accent);
        text-decoration: none;
        margin: 0 8px;
      }
      .links a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="mark">&#9673;</div>
        <div class="eyebrow">Monitor Browser</div>
        <h1>Homepage dashboard is offline.</h1>
        <p>
          The live threat picture at
          <strong>osintview.app</strong> couldn&rsquo;t be reached. Check your
          connection and retry.
        </p>
        <button id="retry" type="button">Retry connection</button>
        <div class="links">
          <a href="https://osintview.app/">osintview.app</a>
          <a href="https://finance.osintview.app/">finance</a>
          <a href="https://commodity.osintview.app/">commodities</a>
          <a href="https://tech.osintview.app/">tech</a>
        </div>
      </div>
    </main>
    <script>
      (function () {
        var btn = document.getElementById('retry');
        btn.addEventListener('click', function () {
          window.location.href = 'https://osintview.app/';
        });
        // Auto-retry once every 15s while the user sits here.
        setInterval(function () {
          fetch('https://osintview.app/', { mode: 'no-cors', cache: 'no-store' })
            .then(function () {
              window.location.href = 'https://osintview.app/';
            })
            .catch(function () { /* still offline */ });
        }, 15000);
      })();
    </script>
  </body>
</html>
