<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor Browser — New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────── */
    :root {
      --intel-accent:        #d4a843;
      --intel-accent-dim:    #b8922f;
      --intel-accent-glow:   rgba(212, 168, 67, 0.20);
      --intel-accent-subtle: rgba(212, 168, 67, 0.07);
      --intel-accent-border: rgba(212, 168, 67, 0.18);
      --bg-deep:    #060608;
      --bg:         #0c0c10;
      --surface:    #12121a;
      --surface-raised: #181822;
      --surface-hover:  #1e1e2c;
      --border:     #252535;
      --border-subtle: #1a1a28;
      --text-primary:   #e8e8f0;
      --text-secondary: #8888a0;
      --text-dim:       #55556a;
      --font-ui:   'Geist', system-ui, sans-serif;
      --font-data: 'JetBrains Mono', monospace;
      --cat-threat:   #e53e3e;
      --cat-cyber:    #9f7aea;
      --cat-market:   #4299e1;
      --cat-news:     #ed8936;
      --cat-positive: #48bb78;
      --cat-military: #f97316;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-ui);
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ── Background ────────────────────────────────────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,168,67,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(91,141,217,0.04) 0%, transparent 50%),
        linear-gradient(180deg, #060608 0%, #090910 40%, #0a0a12 100%);
    }

    /* Subtle grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 0%, transparent 100%);
    }

    /* Radar sweep animation in background */
    .bg-radar {
      position: fixed;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      z-index: 0;
      opacity: 0.04;
      pointer-events: none;
    }
    .bg-radar circle { fill: none; stroke: var(--intel-accent); }
    .bg-radar .sweep {
      transform-origin: 300px 300px;
      animation: radar-spin 8s linear infinite;
    }
    @keyframes radar-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Layout ────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Top Bar ───────────────────────────────────────────── */
    .top-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(6,6,8,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .top-bar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .top-bar-logo svg { width: 22px; height: 22px; }
    .top-bar-logo-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--intel-accent);
    }

    .top-bar-meta {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .top-bar-clock {
      font-family: var(--font-data);
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }
    .top-bar-location {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .top-bar-threat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cat-news);
      background: rgba(237,137,54,0.1);
      border: 1px solid rgba(237,137,54,0.2);
      border-radius: 4px;
      padding: 3px 10px;
    }
    .threat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--cat-news);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Hero Section ──────────────────────────────────────── */
    .hero {
      width: 100%;
      max-width: 700px;
      padding: 60px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: hero-in 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes hero-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-greeting {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--intel-accent);
      opacity: 0.8;
    }

    /* ── Search Bar ────────────────────────────────────────── */
    .search-wrap {
      width: 100%;
      position: relative;
    }
    .search-bar {
      width: 100%;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 52px 0 20px;
      font-family: var(--font-ui);
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .search-bar::placeholder { color: var(--text-dim); }
    .search-bar:focus {
      border-color: var(--intel-accent-border);
      box-shadow: 0 0 0 3px var(--intel-accent-glow), 0 4px 20px rgba(0,0,0,0.4);
      background: var(--surface-raised);
    }
    .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      transition: color 0.2s;
    }
    .search-wrap:focus-within .search-icon {
      color: var(--intel-accent);
    }

    /* Search engine pills */
    .search-engines {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .engine-pill {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .engine-pill:hover,
    .engine-pill.active {
      background: var(--intel-accent-subtle);
      border-color: var(--intel-accent-border);
      color: var(--intel-accent);
    }

    /* ── Quick Links ───────────────────────────────────────── */
    .shortcuts-section {
      width: 100%;
      max-width: 700px;
      padding: 0 24px;
      animation: hero-in 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .shortcuts-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      padding: 10px 8px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.18s;
      text-decoration: none;
      width: 76px;
    }
    .shortcut:hover {
      background: var(--surface-hover);
      border-color: var(--border);
      transform: translateY(-2px);
    }
    .shortcut-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: border-color 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .shortcut:hover .shortcut-icon {
      border-color: var(--intel-accent-border);
      box-shadow: 0 0 0 1px var(--intel-accent-border), 0 4px 12px rgba(0,0,0,0.3);
    }
    /* Color accent bar at top of icon per category */
    .shortcut-icon::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--shortcut-color, var(--intel-accent));
      opacity: 0;
      transition: opacity 0.18s;
    }
    .shortcut:hover .shortcut-icon::before { opacity: 1; }

    .shortcut-label {
      font-size: 10.5px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      transition: color 0.18s;
    }
    .shortcut:hover .shortcut-label { color: var(--text-primary); }

    /* Add shortcut button */
    .shortcut-add .shortcut-icon {
      background: transparent;
      border-style: dashed;
      border-color: var(--border);
      color: var(--text-dim);
      font-size: 22px;
    }

    /* ── Divider ───────────────────────────────────────────── */
    .section-divider {
      width: 100%;
      max-width: 1200px;
      padding: 0 24px;
      margin: 28px 0 0;
    }
    .divider-line {
      border: none;
      border-top: 1px solid var(--border-subtle);
    }

    /* ── Feed Section ──────────────────────────────────────── */
    .feed-section {
      width: 100%;
      max-width: 1200px;
      padding: 20px 24px 40px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      animation: hero-in 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Feed header */
    .feed-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .feed-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .feed-tabs {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    .feed-tab {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
      border: none;
      background: transparent;
      font-family: var(--font-ui);
    }
    .feed-tab.active {
      background: var(--intel-accent-subtle);
      color: var(--intel-accent);
      border: 1px solid var(--intel-accent-border);
    }
    .feed-tab:not(.active):hover { color: var(--text-primary); }

    .feed-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .feed-btn {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: var(--font-ui);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
    }
    .feed-btn:hover {
      border-color: var(--intel-accent-border);
      color: var(--intel-accent);
      background: var(--intel-accent-subtle);
    }

    /* ── Main Feed ─────────────────────────────────────────── */
    .feed-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Hero card */
    .card-hero {
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 200px;
      text-decoration: none;
    }
    .card-hero:hover {
      border-color: var(--intel-accent-border);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .card-hero-image {
      background: var(--surface-raised);
      position: relative;
      overflow: hidden;
    }
    .card-hero-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.7;
      transition: opacity 0.3s, transform 0.3s;
    }
    .card-hero:hover .card-hero-image img {
      opacity: 0.85;
      transform: scale(1.02);
    }
    .card-hero-image-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--surface-raised) 0%, var(--surface-hover) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: 0.3;
    }
    .card-hero-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card-category-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      width: fit-content;
    }
    .badge-threat  { background: rgba(229,62,62,0.12);   color: var(--cat-threat);   border: 1px solid rgba(229,62,62,0.2); }
    .badge-cyber   { background: rgba(159,122,234,0.12); color: var(--cat-cyber);    border: 1px solid rgba(159,122,234,0.2); }
    .badge-market  { background: rgba(66,153,225,0.12);  color: var(--cat-market);   border: 1px solid rgba(66,153,225,0.2); }
    .badge-news    { background: rgba(237,137,54,0.12);  color: var(--cat-news);     border: 1px solid rgba(237,137,54,0.2); }
    .badge-mil     { background: rgba(249,115,22,0.12);  color: var(--cat-military); border: 1px solid rgba(249,115,22,0.2); }
    .badge-intel   { background: rgba(212,168,67,0.12);  color: var(--intel-accent); border: 1px solid var(--intel-accent-border); }

    .card-hero-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .card-hero-desc {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .card-source {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
    }
    .card-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-dim); }
    .card-time {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Regular cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      border-color: var(--intel-accent-border);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }
    .card-image {
      height: 120px;
      background: var(--surface-raised);
      position: relative;
      overflow: hidden;
    }
    .card-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.65;
      transition: opacity 0.3s, transform 0.3s;
    }
    .card:hover .card-image img {
      opacity: 0.8;
      transform: scale(1.03);
    }
    .card-image-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      opacity: 0.25;
    }
    /* Severity bar at top of card */
    .card-severity {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .severity-critical { background: var(--cat-threat); }
    .severity-high     { background: var(--cat-military); }
    .severity-medium   { background: var(--intel-accent); }
    .severity-low      { background: var(--cat-market); }
    .severity-info     { background: var(--cat-positive); }

    .card-body {
      padding: 12px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 6px;
    }

    /* ── Right Sidebar ─────────────────────────────────────── */
    .feed-sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar-widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .widget-header {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .widget-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .widget-title-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--intel-accent);
    }
    .widget-more {
      font-size: 11px;
      color: var(--intel-accent);
      cursor: pointer;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .widget-more:hover { opacity: 1; }

    /* Markets widget */
    .market-row {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s;
      cursor: pointer;
    }
    .market-row:last-child { border-bottom: none; }
    .market-row:hover { background: var(--surface-hover); }
    .market-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .market-sub {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .market-price {
      text-align: right;
    }
    .market-value {
      font-family: var(--font-data);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .market-change {
      font-family: var(--font-data);
      font-size: 10px;
      font-weight: 500;
      margin-top: 1px;
    }
    .change-up   { color: #48bb78; }
    .change-down { color: #e53e3e; }

    /* Alerts widget */
    .alert-item {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-item:hover { background: var(--surface-hover); }
    .alert-severity-bar {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      align-self: stretch;
      min-height: 36px;
    }
    .alert-content {}
    .alert-title {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .alert-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 3px;
    }
    .alert-region {
      font-size: 10px;
      color: var(--text-dim);
    }
    .alert-time {
      font-family: var(--font-data);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* Weather / Status widget */
    .status-row {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background 0.15s;
    }
    .status-row:last-child { border-bottom: none; }
    .status-row:hover { background: var(--surface-hover); }
    .status-icon { font-size: 18px; width: 24px; text-align: center; }
    .status-label {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .status-value {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--text-secondary);
    }
    .status-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .ind-ok     { background: #48bb78; }
    .ind-warn   { background: #ed8936; box-shadow: 0 0 4px rgba(237,137,54,0.5); }

function updateClock() {
  const now = new Date();
  const utc = now.toUTCString().match(/(\d{2}:\d{2}:\d{2})/);
  document.getElementById('clockDisplay').textContent = (utc ? utc[1] : '00:00:00') + ' UTC';

  const h = now.getHours();
  const greet = h < 5 ? 'Good night' : h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : h < 21 ? 'Good evening' : 'Good night';
  document.getElementById('greetingText').textContent = greet + ', Analyst';

  const dateStr = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  document.getElementById('footerDate').textContent = dateStr;
}
updateClock();
setInterval(updateClock, 1000);

  navigator.geolocation.getCurrentPosition(pos => {
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
      .then(r => r.json())
      .then(d => {
        const city = d.address?.city || d.address?.town || d.address?.village || d.address?.county || '';
        const state = d.address?.state || '';
        document.getElementById('locationDisplay').textContent = city ? `${city}, ${state}` : 'Unknown';
      }).catch(() => { document.getElementById('locationDisplay').textContent = 'Unknown'; });
  }, () => { document.getElementById('locationDisplay').textContent = 'Unknown'; });
} else {
  document.getElementById('locationDisplay').textContent = 'Unknown';

  brave:  q => `https://search.brave.com/search?q=${encodeURIComponent(q)}`,
  shodan: q => `https://www.shodan.io/search?query=${encodeURIComponent(q)}`,
  gdelt:  q => `https://gdeltproject.org/data/#googlebigquery&q=${encodeURIComponent(q)}`,
  intelx: q => `https://intelx.io/?s=${encodeURIComponent(q)}`,
};
let activeEngine = 'ddg';

document.querySelectorAll('.engine-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.engine-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeEngine = pill.dataset.engine;
    document.getElementById('searchInput').focus();
  });
});

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = searchInput.value.trim();
  if (!q) return;
  // If it looks like a URL, navigate directly
  const isUrl = /^(https?:\/\/|www\.)/.test(q) || /^[a-z0-9-]+\.[a-z]{2,}(\/.*)?$/.test(q);
  const url = isUrl ? (q.startsWith('http') ? q : 'https://' + q) : ENGINES[activeEngine](q);
  // In Tauri: invoke('navigate', { url }); For now open in same window
  window.location.href = url;
});

function renderFeed(tab) {
  const data = FEED_DATA[tab] || FEED_DATA.intel;

  data.forEach((item, i) => {
    if (item.type === 'hero') {

      el.className = 'card-hero';
      el.style.animationDelay = (i * 0.05) + 's';
      el.innerHTML = `
        <div class="card-hero-image">

            <div class="card-hero-desc">${item.desc}</div>

            <span class="card-dot"></span>
            <span class="card-time">${item.time}</span>

      `;
      container.appendChild(el);

  });

  // Cards grid
  const cards = data.filter(d => d.type === 'card');
  if (cards.length) {

// ── Keyboard shortcut: focus search on any key ──────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'F6' || (e.metaKey || e.ctrlKey) && e.key === 'l') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});
