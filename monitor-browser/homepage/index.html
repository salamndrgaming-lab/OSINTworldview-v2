<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor &mdash; Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./homepage.css" />
  </head>
  <body>
    <div class="radar-bg" aria-hidden="true">
      <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="sweep-gradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#d4a843" stop-opacity="0" />
            <stop offset="100%" stop-color="#d4a843" stop-opacity="0.75" />
          </linearGradient>
        </defs>
        <circle class="radar-ring" cx="500" cy="500" r="480" />
        <circle class="radar-ring" cx="500" cy="500" r="360" />
        <circle class="radar-ring" cx="500" cy="500" r="240" />
        <circle class="radar-ring" cx="500" cy="500" r="120" />
        <line class="radar-ring" x1="500" y1="20" x2="500" y2="980" opacity="0.3" />
        <line class="radar-ring" x1="20" y1="500" x2="980" y2="500" opacity="0.3" />
        <path class="radar-sweep" d="M 500 500 L 500 20 A 480 480 0 0 1 980 500 Z" />
      </svg>
    </div>

    <main class="shell">
      <header class="top-header">
        <div class="brand">
          <span class="brand-mark">&#9673;</span>
          <span class="brand-name"><b>Monitor</b> &middot; OSINT Edition</span>
        </div>
        <div class="header-right">
          <div class="clock-group">
            <span class="clock-label">UTC</span>
            <span class="clock-time" id="clock-time">&mdash;</span>
            <span class="clock-date" id="clock-date">&mdash;</span>
          </div>
          <div class="header-actions">
            <button class="btn-ghost" id="customize-btn" title="Customize dashboard">
              <span class="btn-icon">&#9881;</span><span>Customize</span>
            </button>
            <button class="btn-ghost" id="preset-btn" title="Layout presets">
              <span class="btn-icon">&#9783;</span><span>Presets</span>
            </button>
            <button class="btn-accent" id="add-panel-btn" title="Add a panel">
              <span class="btn-icon">&#43;</span><span>Add panel</span>
            </button>
          </div>
        </div>
      </header>

      <section class="hero">
        <h1>Every new tab is a <span class="accent">live threat picture</span>.</h1>
        <form class="search" id="search-form" autocomplete="off" spellcheck="false">
          <span class="search-icon">&#8981;</span>
          <input
            id="search-input"
            type="text"
            placeholder="Search the web or enter URL&hellip;"
            autofocus
          />
          <span class="search-hint">&crarr;</span>
        </form>
      </section>

      <section class="dashboard" id="dashboard" aria-label="Intelligence dashboard"></section>

      <p class="customize-hint" id="customize-hint">
        Your dashboard is empty. Click <b>Add panel</b> above to populate it.
      </p>
    </main>

    <footer class="status-bar">
      <div>
        <span class="status-dot"></span>
        Monitor Browser v1.0 &middot; <span id="footer-date">&mdash;</span> &middot; OSINT Edition
      </div>
      <div>
        <span class="hint"><kbd>Ctrl+T</kbd> new tab</span>
        <span class="hint"><kbd>Ctrl+L</kbd> URL bar</span>
        <span class="hint"><kbd>Alt+&larr;</kbd> back</span>
      </div>
    </footer>

    <div class="modal-root" id="modal-root"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./homepage.js"></script>
  </body>
</html>
