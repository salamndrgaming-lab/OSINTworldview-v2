<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <div id="chrome" class="chrome"></div>
      <aside id="sidebar" class="sidebar" aria-label="Intelligence sidebar"></aside>
      <div id="webview-host" class="webview-host">
        <div id="webview-loading" class="webview-loading"></div>
        <iframe
          id="webview-frame"
          class="webview-frame"
          title="Main webview"
          src="about:blank"
          allow="clipboard-read; clipboard-write; fullscreen; geolocation; microphone; camera"
        ></iframe>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
