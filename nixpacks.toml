# Railway build config — root service (Vercel edge functions, not the relay).
# NODE_OPTIONS: --dns-result-order=ipv4first forces IPv4 on Railway's shared
# outbound IP pool. GDELT's CDN responds differently to IPv4 vs IPv6 and
# IPv4-first meaningfully reduces 429 rate-limit frequency from containerised
# environments (confirmed by osintview production data).

[phases.setup]
aptPkgs = ["curl"]

[variables]
NODE_OPTIONS = "--dns-result-order=ipv4first"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]
